<!DOCTYPE html>
<html>
<head>
  <title>Resume Optimizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>AI Resume Optimizer</h1>
    <p>Tailor your resume to any job description in seconds.</p>
  </header>

  <main>
    <section>
      <h2>Your Resume</h2>
      <textarea id="resumeInput" placeholder="Paste your resume text here..."></textarea>
    </section>

    <section>
      <h2>Job Description</h2>
      <textarea id="jobInput" placeholder="Paste the job description here..."></textarea>
    </section>

    <button id="optimizeBtn">Optimize My Resume</button>

    <section>
      <h2>Results</h2>
      <p id="resultsArea">Your ATS score and optimized resume will appear here.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
